<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117" />
      <stop offset="100%" style="stop-color:#161b22" />
    </linearGradient>
    <linearGradient id="funnel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#388bfd" />
      <stop offset="50%" style="stop-color:#2ea043" />
      <stop offset="100%" style="stop-color:#56d364" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3b341" />
      <stop offset="100%" style="stop-color:#d29922" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="127" height="127" rx="28" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Funnel icon centered -->
  <g transform="translate(64, 58)">
    <!-- Funnel shape -->
    <polygon points="-34,-35 34,-35 10,10 10,32 -10,32 -10,10"
      fill="url(#funnel)" opacity="0.12" stroke="url(#funnel)" stroke-width="1.5"/>

    <!-- Filter layers -->
    <line x1="-28" y1="-24" x2="28" y2="-24" stroke="#388bfd" stroke-width="2.5" opacity="0.8" stroke-linecap="round"/>
    <line x1="-19" y1="-11" x2="19" y2="-11" stroke="#1f6feb" stroke-width="2.5" opacity="0.8" stroke-linecap="round"/>
    <line x1="-13" y1="2" x2="13" y2="2" stroke="#2ea043" stroke-width="2.5" opacity="0.8" stroke-linecap="round"/>
    <line x1="-10" y1="15" x2="10" y2="15" stroke="#56d364" stroke-width="2.5" opacity="0.9" stroke-linecap="round"/>

    <!-- Dollar sign -->
    <text x="0" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="url(#gold)" filter="glow">$</text>

    <!-- Incoming dots -->
    <circle cx="-20" cy="-42" r="2.5" fill="#388bfd" opacity="0.5"/>
    <circle cx="-5" cy="-45" r="2" fill="#388bfd" opacity="0.4"/>
    <circle cx="10" cy="-43" r="2.5" fill="#388bfd" opacity="0.5"/>
    <circle cx="22" cy="-44" r="2" fill="#388bfd" opacity="0.4"/>

    <!-- Output diamond -->
    <rect x="-4" y="38" width="8" height="8" fill="#56d364" opacity="0.9" transform="rotate(45 0 42)" filter="glow"/>
  </g>
</svg>
